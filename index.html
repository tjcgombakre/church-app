<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Church Class Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f0f4ff;min-height:100vh;min-height:-webkit-fill-available}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.landing h1{font-size:22px;font-weight:800;color:#1a1a2e;text-align:center}
.landing>p{font-size:13px;color:#888;text-align:center;margin-top:-12px}
.portal-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%;max-width:480px}
.portal-card{flex:1;min-width:150px;border-radius:20px;padding:26px 18px;text-align:center;cursor:pointer;transition:all 0.2s;border:2px solid transparent;-webkit-user-select:none;user-select:none}
.portal-card:active{transform:scale(0.97)}
.portal-card .pc-icon{font-size:38px;margin-bottom:10px}
.portal-card h2{font-size:15px;font-weight:800;margin-bottom:4px}
.portal-card p{font-size:12px;opacity:0.75}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 30px rgba(0,0,0,0.1);text-align:center}
.login-card .lc-icon{font-size:42px;margin-bottom:10px}
.login-card h2{font-size:19px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.login-card p{font-size:13px;color:#888;margin-bottom:18px}

/* ADMIN LAYOUT */
.app{display:flex;height:100vh;height:-webkit-fill-available;overflow:hidden;flex-direction:column}

/* DESKTOP SIDEBAR */
.sidebar{width:215px;background:#1a1a2e;display:flex;flex-direction:column;padding:16px 0;flex-shrink:0;overflow-y:auto;transition:transform 0.3s}
.sidebar-logo{padding:0 16px 14px;border-bottom:1px solid #ffffff22}
.sidebar-logo h1{color:#fff;font-size:13px;font-weight:700;line-height:1.3}

/* MOBILE TOP BAR */
.mobile-topbar{display:none;background:#1a1a2e;padding:12px 16px;align-items:center;justify-content:space-between;flex-shrink:0}
.mobile-topbar h1{color:#fff;font-size:14px;font-weight:700}
.hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}

/* MOBILE DRAWER OVERLAY */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:240px;background:#1a1a2e;z-index:301;transform:translateX(-100%);transition:transform 0.3s;overflow-y:auto;padding:16px 0}
.drawer.open{transform:translateX(0)}
.drawer-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer}

.sync-dot{width:8px;height:8px;border-radius:50%;background:#1dd1a1;display:inline-block;margin-left:6px;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-dot.off{background:#ff6b9d;animation:none}
.nav-section{padding:10px 16px 3px;color:#aaa;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 16px;color:#ccc;font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all 0.2s;-webkit-user-select:none;user-select:none}
.nav-btn:hover,.nav-btn:active{background:#ffffff11;color:#fff}
.nav-btn.active{background:#ffffff22;color:#fff;border-left:3px solid #7c6ff7}
.nav-btn.active.clr{border-left-color:var(--cl)}
.nav-btn .icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-divider{height:1px;background:#ffffff11;margin:6px 16px}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.topbar{background:#fff;padding:11px 16px;border-bottom:1px solid #e8e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap}
.topbar h2{font-size:16px;font-weight:700;color:#1a1a2e}
.topbar p{font-size:11px;color:#888}
.content{padding:14px;flex:1}

/* PARENT PORTAL */
.parent-app{min-height:100vh;background:#f8f0ff}
.parent-header{background:linear-gradient(135deg,#7c6ff7,#ff6b9d);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.parent-header h1{color:#fff;font-size:16px;font-weight:800}
.parent-body{padding:14px;max-width:700px;margin:0 auto}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#7c6ff7;color:#fff}
.btn-secondary{background:#f0f0ff;color:#7c6ff7;border:1px solid #d0d0ff}
.btn-success{background:#1dd1a1;color:#fff}
.btn-danger{background:#ff6b9d;color:#fff}
.btn-warn{background:#ff9f43;color:#fff}
.btn-white{background:#fff;color:#7c6ff7}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}

/* PANELS */
.panel{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #e8e8f0}
.panel>h3{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.tab-row{display:flex;gap:3px;margin-bottom:14px;background:#f0f0ff;border-radius:12px;padding:3px;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#888;transition:all 0.2s;flex:1;text-align:center;min-width:0;-webkit-user-select:none;user-select:none}
.tab.active{background:#fff;color:#7c6ff7;box-shadow:0 2px 8px rgba(124,111,247,0.15)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:#f8f8ff;border-radius:12px;padding:10px;text-align:center}
.stat-card .num{font-size:18px;font-weight:700;color:#1a1a2e}
.stat-card .lbl{font-size:10px;color:#888;margin-top:2px}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f8ff;padding:8px;text-align:left;font-weight:600;color:#444;font-size:11px;border-bottom:2px solid #e8e8f0}
td{padding:7px 8px;border-bottom:1px solid #f0f0f8;color:#333;vertical-align:middle}
tr:hover td{background:#fafafe}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.tag{display:inline-block;padding:2px 6px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:#e8fff8;color:#0d9e75}.tag-red{background:#fff0f5;color:#d63060}
.tag-blue{background:#f0f0ff;color:#7c6ff7}.tag-orange{background:#fff8f0;color:#e07000}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:100px}
.form-group label{font-size:11px;font-weight:600;color:#666}
.form-group input,.form-group select,.form-group textarea{padding:9px 10px;border-radius:9px;border:1.5px solid #e0e0f0;font-size:14px;outline:none;transition:border-color 0.2s;background:#fff;width:100%;-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#7c6ff7}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h3{font-size:15px;font-weight:700;margin-bottom:13px;color:#1a1a2e}
.modal-btns{display:flex;gap:8px;margin-top:13px;justify-content:flex-end}
.modal-handle{width:40px;height:4px;background:#e0e0f0;border-radius:2px;margin:0 auto 16px}

/* ATTENDANCE */
.att-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:11px;font-weight:700;-webkit-user-select:none;user-select:none}
.att-present{background:#1dd1a1;color:#fff}.att-absent{background:#ff6b9d;color:#fff}.att-none{background:#f0f0f0;color:#aaa}
.pct-bar{height:6px;background:#f0f0f8;border-radius:4px;overflow:hidden;width:55px;display:inline-block;vertical-align:middle}
.pct-fill{height:100%;border-radius:4px}
.chip{padding:5px 10px;border-radius:20px;border:2px solid #e0e0f0;font-size:12px;cursor:pointer;font-weight:600;background:#fff;color:#666;-webkit-user-select:none;user-select:none}
.chip.sel{border-color:#7c6ff7;background:#f0f0ff;color:#7c6ff7}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.score-input{width:50px;padding:4px 6px;border-radius:7px;border:1.5px solid #e0e0f0;font-size:13px;text-align:center;outline:none}
.score-input:focus{border-color:#7c6ff7}
.uni-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;-webkit-user-select:none;user-select:none}
.uni-ret{background:#e8fff8;color:#0d9e75}.uni-kept{background:#fff0f5;color:#d63060}.uni-none{background:#f0f0f0;color:#888}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.empty-state{text-align:center;padding:28px 16px;color:#aaa}
.empty-state .bi{font-size:30px;margin-bottom:8px}
.class-hero{border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.class-hero .em{font-size:32px}
.class-hero h2{font-size:16px;font-weight:800;color:#fff}
.class-hero p{font-size:12px;color:rgba(255,255,255,0.8)}

/* TIMETABLE */
.week-row{display:grid;grid-template-columns:85px repeat(6,1fr);gap:4px;margin-bottom:4px}
.wk-lbl{background:#f0f0f8;border-radius:8px;padding:5px;font-size:9px;font-weight:700;color:#7c6ff7;display:flex;flex-direction:column;justify-content:center;text-align:center;line-height:1.5}
.wk-lbl span{font-size:8px;color:#aaa;font-weight:400}
.tt-cell{border-radius:8px;border:2px dashed #e0e0f0;padding:4px;min-height:52px;cursor:pointer;font-size:9px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:2px;background:#fafafe;-webkit-user-select:none;user-select:none}
.tt-cell:active{border-color:#7c6ff7;background:#f0f0ff}
.tt-cell.filled{border-style:solid;background:#fff}
.tt-cell .t-name{font-weight:700;font-size:10px;color:#1a1a2e}
.tt-cell .t-lesson{font-size:8px;color:#7c6ff7;word-break:break-word;line-height:1.3}
.tt-header-row{display:grid;grid-template-columns:85px repeat(6,1fr);gap:4px;margin-bottom:5px}
.tt-col-hdr{border-radius:8px;padding:5px;font-size:9px;font-weight:700;text-align:center;color:#fff}
.month-div{font-size:11px;font-weight:700;color:#7c6ff7;padding:7px 0 3px;border-top:1px solid #e8e8f0;margin-top:3px}
.yr-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.yr-nav button{background:#f0f0ff;border:none;border-radius:8px;padding:5px 12px;font-size:14px;font-weight:700;cursor:pointer;color:#7c6ff7}
.yr-nav span{font-size:14px;font-weight:700;color:#1a1a2e}
.notice{background:#f0f8ff;border:1px solid #c0d8ff;border-radius:9px;padding:8px 12px;font-size:12px;color:#2060c0;margin-bottom:10px}
.srow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f8}
.ph-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f0f0f8;font-size:12px}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#7c6ff7}
.spinner{width:36px;height:36px;border:4px solid #e0e0ff;border-top:4px solid #7c6ff7;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DESKTOP: show sidebar, hide mobile elements */
@media(min-width:640px){
  .app{flex-direction:row}
  .sidebar{display:flex}
  .mobile-topbar{display:none}
  .drawer,.drawer-overlay{display:none!important}
  .modal-overlay{align-items:center}
  .modal{border-radius:20px;max-width:520px}
  .modal-handle{display:none}
  .content{padding:18px}
  .topbar{padding:11px 20px}
}

/* MOBILE: hide sidebar, show mobile top bar + drawer */
@media(max-width:639px){
  .app{flex-direction:column}
  .sidebar{display:none}
  .mobile-topbar{display:flex}
  .topbar h2{font-size:15px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .week-row{grid-template-columns:65px repeat(6,1fr)}
  .tt-cell{min-height:44px}
}
</style>
</head>
<body>
<div id="root"><div class="loading-screen"><div class="spinner"></div><p style="font-size:14px;font-weight:600">Connecting to database...</p></div></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-box"><div class="modal-handle"></div></div></div>
<!-- Mobile drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getDatabase,ref,set,onValue,remove}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyCp1DjIYixBco9SHo3LUZMqHxBZbqkQBFo",
  authDomain:"church-class-manager.firebaseapp.com",
  databaseURL:"https://church-class-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"church-class-manager",
  storageBucket:"church-class-manager.firebasestorage.app",
  messagingSenderId:"527438905285",
  appId:"1:527438905285:web:d986b84b4324326c9dd5ac"
};

const firebaseApp=initializeApp(firebaseConfig);
const db=getDatabase(firebaseApp);

const CLS=[
  {id:'nursery',name:'Nursery',emoji:'🍼',color:'#ff6b9d',light:'#fff0f6'},
  {id:'kinder',name:'Kindergarten',emoji:'🌈',color:'#ff9f43',light:'#fff8f0'},
  {id:'lprimary',name:'Lower Primary',emoji:'📚',color:'#54a0ff',light:'#f0f7ff'},
  {id:'uprimary',name:'Upper Primary',emoji:'🎓',color:'#5f27cd',light:'#f4f0ff'},
  {id:'jyouth',name:'Junior Youth',emoji:'⭐',color:'#00d2d3',light:'#f0fffe'},
  {id:'iyouth',name:'Intermediate Youth',emoji:'🔥',color:'#1dd1a1',light:'#f0fff8'},
];
const SIZES=['XS','S','M','L','XL'];
const STOCK={XS:4,S:8,M:7,L:5,XL:3};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const BEHAVIOURS=['Attentive','Participative','Respectful','Helpful','Creative','Needs Reminder','Quiet','Energetic','On-task','Off-task'];
const SCHOOL_TYPES=['Public','Private','International','Homeschool'];
const MY_PH={
  '2025-01-01':"New Year's Day",'2025-01-29':'Chinese New Year','2025-01-30':'Chinese New Year (2)',
  '2025-02-01':'Federal Territory Day','2025-02-11':'Thaipusam','2025-03-30':'Nuzul Al-Quran',
  '2025-03-31':'Hari Raya Aidilfitri','2025-04-01':'Hari Raya (2)','2025-05-01':'Labour Day',
  '2025-05-12':'Wesak Day','2025-06-02':"Agong's Birthday",'2025-06-07':'Hari Raya Aidiladha',
  '2025-06-28':'Awal Muharram','2025-08-31':'National Day','2025-09-05':'Maulidur Rasul',
  '2025-09-16':'Malaysia Day','2025-10-20':'Deepavali','2025-12-25':'Christmas Day',
  '2026-01-01':"New Year's Day",'2026-01-28':'Chinese New Year','2026-01-29':'Chinese New Year (2)',
  '2026-02-01':'Federal Territory Day','2026-03-20':'Hari Raya Aidilfitri','2026-03-21':'Hari Raya (2)',
  '2026-05-01':'Labour Day','2026-05-31':'Wesak Day','2026-06-01':"Agong's Birthday",
  '2026-08-31':'National Day','2026-09-16':'Malaysia Day','2026-12-25':'Christmas Day',
};
const MY_SH=[['2025-01-01','2025-01-02'],['2025-03-15','2025-03-23'],['2025-05-17','2025-05-25'],['2025-07-19','2025-08-17'],['2025-09-13','2025-09-21'],['2025-11-22','2026-01-01'],['2026-03-14','2026-03-22'],['2026-05-16','2026-05-24'],['2026-07-18','2026-08-16'],['2026-09-12','2026-09-20'],['2026-11-21','2026-12-31']];
const isPH=ds=>MY_PH[ds]||null;
const isSH=ds=>{const d=new Date(ds);return MY_SH.some(([s,e])=>d>=new Date(s)&&d<=new Date(e));};
const holInfo=ds=>{const ph=isPH(ds);if(ph)return{type:'ph',label:ph};if(isSH(ds))return{type:'sh',label:'School Holiday'};return null;};

let S={students:[],teachers:[],attendance:{},sessions:[],behaviour:[],tests:[],uniform:{},timetable:{},ttYear:new Date().getFullYear(),events:{},adminPass:'admin123'};
let syncConnected=false;

async function saveToFB(path,data){try{await set(ref(db,path),data);}catch(e){console.error(e);}}
const saveStudents=()=>saveToFB('church/students',S.students);
const saveTeachers=()=>saveToFB('church/teachers',S.teachers);
const saveSessions=()=>saveToFB('church/sessions',S.sessions);
const saveAttendance=()=>saveToFB('church/attendance',S.attendance);
const saveBehaviour=()=>saveToFB('church/behaviour',S.behaviour);
const saveTests=()=>saveToFB('church/tests',S.tests);
const saveUniform=()=>saveToFB('church/uniform',S.uniform);
const saveTimetable=()=>saveToFB('church/timetable',S.timetable);
const saveEvents=()=>saveToFB('church/events',S.events);
const saveSettings=()=>saveToFB('church/adminPass',S.adminPass);
const saveTTYear=()=>saveToFB('church/ttYear',S.ttYear);

function startSync(){
  onValue(ref(db,'church'),snap=>{
    const d=snap.val();
    if(d){
      S={...S,...d};
      if(!S.students)S.students=[];if(!S.teachers)S.teachers=[];if(!S.sessions)S.sessions=[];
      if(!S.attendance)S.attendance={};if(!S.behaviour)S.behaviour=[];if(!S.tests)S.tests=[];
      if(!S.uniform)S.uniform={};if(!S.timetable)S.timetable={};if(!S.events)S.events={};
      if(!S.adminPass)S.adminPass='admin123';
    }
    syncConnected=true;updateSyncDots();
    if(screen==='admin')rerenderCurrent();
    else if(screen==='parent')renderParentPortal();
    else if(screen==='landing')renderRoot();
  },()=>{syncConnected=false;updateSyncDots();});
}
function updateSyncDots(){document.querySelectorAll('.sync-dot').forEach(d=>{d.className='sync-dot'+(syncConnected?'':' off');});}

const R=id=>document.getElementById(id);
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const clById=id=>CLS.find(c=>c.id===id)||CLS[0];
const studsIn=cid=>(S.students||[]).filter(s=>s.classId===cid);
const calcAge=dob=>{if(!dob)return'–';const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))a--;return a;};
const pctColor=p=>p>=80?'#1dd1a1':p>=60?'#ff9f43':'#ff6b9d';
function attPct(sid){const sess=S.sessions||[];if(!sess.length)return null;const p=sess.filter(s=>(S.attendance||{})[s+'_'+sid]==='P').length;return Math.round(p/sess.length*100);}
function classPct(cid){const st=studsIn(cid);if(!st.length||!(S.sessions||[]).length)return null;const v=st.map(x=>attPct(x.id)).filter(x=>x!==null);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;}
function overallPct(){const v=CLS.map(c=>classPct(c.id)).filter(x=>x!==null);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;}
const fmt=d=>`${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
const isoDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function getWeeks(year){
  const weeks=[];let d=new Date(year,0,1);const jan1=new Date(year,0,1);
  while(d.getDay()!==0)d.setDate(d.getDate()+1);
  if(jan1.getDay()!==0){const end=new Date(d);end.setDate(end.getDate()-1);weeks.push({n:1,start:jan1,end});}
  let wn=weeks.length+1;
  while(d.getFullYear()===year){const s=new Date(d),e=new Date(d);e.setDate(e.getDate()+6);if(e.getFullYear()>year)e.setFullYear(year,11,31);weeks.push({n:wn,start:s,end:e});wn++;d.setDate(d.getDate()+7);}
  return weeks;
}

  <div class="form-row"><div class="form-group"><label>Full Name</label><input id="m-sn" value="${s?s.name:''}" placeholder="Full name"/></div></div>
  <div class="form-row">
    <div class="form-group"><label>Class</label><select id="m-sc">${CLS.map(cl=>`<option value="${cl.id}" ${s&&s.classId===cl.id?'selected':''}>${cl.emoji} ${cl.name}</option>`).join('')}</select></div>
    <div class="form-group"><label>Date of Birth</label><input type="date" id="m-sdob" value="${s?s.dob||'':''}"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Holy Spirit</label><select id="m-shs"><option value="no" ${!s||s.holySpirit==='no'?'selected':''}>No</option><option value="yes" ${s&&s.holySpirit==='yes'?'selected':''}>Yes</option></select></div>
    <div class="form-group"><label>Baptised</label><select id="m-sbap"><option value="no" ${!s||s.baptised==='no'?'selected':''}>No</option><option value="yes" ${s&&s.baptised==='yes'?'selected':''}>Yes</option></select></div>
    <div class="form-group"><label>Truth Seeking</label><select id="m-sts"><option value="no" ${!s||s.truthSeeking==='no'?'selected':''}>No</option><option value="yes" ${s&&s.truthSeeking==='yes'?'selected':''}>Yes</option></select></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>School Type</label><select id="m-sst">${SCHOOL_TYPES.map(t=>`<option value="${t}" ${s&&s.schoolType===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="form-group"><label>School Name</label><input id="m-ssn" value="${s?s.schoolName||'':''}" placeholder="School name"/></div>
  </div>
  <div class="form-row"><div class="form-group"><label>Parent Login Password</label><input id="m-spp" value="${s?s.parentPass||'':''}" placeholder="e.g. 1234"/></div></div>`;}
window.openAddStudent=function(){openModal(`<h3>Add Student</h3>${stuModal(null)}<div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addStudent()">Add</button></div>`);};
window.addStudent=async function(){
  const name=R('m-sn').value.trim();if(!name)return;
  const colors=['#ff6b9d','#ff9f43','#54a0ff','#5f27cd','#00d2d3','#1dd1a1'];
  S.students=[...(S.students||[]),{id:'s'+Date.now(),name,classId:R('m-sc').value,avatar:colors[Math.floor(Math.random()*colors.length)],
    dob:R('m-sdob').value,holySpirit:R('m-shs').value,baptised:R('m-sbap').value,truthSeeking:R('m-sts').value,
    schoolType:R('m-sst').value,schoolName:R('m-ssn').value.trim(),parentPass:R('m-spp').value.trim()}];
  await saveStudents();closeModal();
};
window.openEditStudent=function(id){const s=(S.students||[]).find(x=>x.id===id);if(!s)return;openModal(`<h3>Edit Student</h3>${stuModal(s)}<div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveStudent('${id}')">Save</button></div>`);};
window.saveStudent=async function(id){
  const s=(S.students||[]).find(x=>x.id===id);if(!s)return;
  s.name=R('m-sn').value.trim()||s.name;s.classId=R('m-sc').value;s.dob=R('m-sdob').value;
  s.holySpirit=R('m-shs').value;s.baptised=R('m-sbap').value;s.truthSeeking=R('m-sts').value;
  s.schoolType=R('m-sst').value;s.schoolName=R('m-ssn').value.trim();s.parentPass=R('m-spp').value.trim();
  await saveStudents();closeModal();
};
window.delStudent=async function(id){if(confirm('Remove student?')){S.students=(S.students||[]).filter(s=>s.id!==id);await saveStudents();}};

function renderTimetable(){
  if(!R('main-content'))return;
  if(R('topbar-actions'))R('topbar-actions').innerHTML=`<button class="btn btn-warn btn-sm" onclick="openAddEvent()">+ Event</button>`;
  const year=S.ttYear||new Date().getFullYear();
  const weeks=getWeeks(year);let lastMonth=-1;
  const rows=weeks.map(wk=>{
    const m=wk.start.getMonth();
    const div=m!==lastMonth?`<div class="month-div">${MONTHS[m]} ${year}</div>`:'';lastMonth=m;
    const si=isoDate(wk.start);const hol=holInfo(si);const evt=(S.events||{})[si];
    const cells=CLS.map(cl=>{const key=`${year}_w${wk.n}_${cl.id}`;const val=(S.timetable||{})[key]||{};
      return`<div class="tt-cell ${val.teacher?'filled':''}" style="${val.teacher?'border-color:'+cl.color+';':''}" onclick="openTTCell('${key}','${cl.name}',${wk.n})">
        ${val.teacher?`<div class="t-name">${val.teacher}</div>${val.lesson?`<div class="t-lesson">${val.lesson}</div>`:''}`:`<span style="font-size:12px;color:#ddd">+</span>`}
      </div>`}).join('');
    return`${div}<div class="week-row"><div class="wk-lbl">W${wk.n}${hol?`<span style="color:${hol.type==='ph'?'#ff6b9d':'#ff9f43'}">${hol.type==='ph'?'🔴':'🟡'}</span>`:''}${evt?`<span style="color:#7c6ff7">📌</span>`:''}
      <span>${fmt(wk.start)}</span><span>${fmt(wk.end)}</span></div>${cells}</div>`;}).join('');
  R('main-content').innerHTML=`
  <div class="panel" style="margin-bottom:10px"><div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px">
    <span>🔴 Public Holiday</span><span>🟡 School Holiday</span><span>📌 Church Event</span></div></div>
  ${Object.keys(S.events||{}).length?`<div class="panel"><h3>📌 Church Events</h3>
    ${Object.entries(S.events).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,evt])=>`
    <div class="ph-row"><div style="width:9px;height:9px;border-radius:50%;background:#7c6ff7;flex-shrink:0"></div>
      <span style="font-weight:700;color:#7c6ff7;white-space:nowrap">${date}</span><span style="flex:1">${evt.title}</span>
      <button class="btn btn-danger btn-sm" onclick="delEvent('${date}')">✕</button></div>`).join('')}
  </div>`:''}
  <div class="panel">
    <div class="yr-nav"><button onclick="changeYear(${year-1})">‹</button><span>${year}</span><button onclick="changeYear(${year+1})">›</button></div>
    <div class="scroll-x"><div style="min-width:560px">
      <div class="tt-header-row"><div></div>${CLS.map(cl=>`<div class="tt-col-hdr" style="background:${cl.color}">${cl.emoji}</div>`).join('')}</div>
      ${rows}
    </div></div>
  </div>`;}
window.changeYear=async function(y){S.ttYear=y;await saveTTYear();renderTimetable();};
window.openTTCell=function(key,className,wkn){
  const val=(S.timetable||{})[key]||{};
  openModal(`<h3>Week ${wkn} — ${className}</h3>
    <div class="form-group" style="margin-bottom:9px"><label>Teacher</label><select id="m-tsel">
      <option value="">— None —</option>
      ${(S.teachers||[]).map(t=>`<option value="${t.name}" ${val.teacher===t.name?'selected':''}>${t.name}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>Lesson / Topic</label><input id="m-tlesson" value="${val.lesson||''}" placeholder="e.g. E1Y1B1 Lesson 2 Crossing the Red Sea"/></div>
    <div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSlot('${key}')">Save</button></div>`);
};
window.saveSlot=async function(key){const t=R('m-tsel').value,l=R('m-tlesson').value.trim();if(!S.timetable)S.timetable={};if(t||l)S.timetable[key]={teacher:t,lesson:l};else delete S.timetable[key];await saveTimetable();closeModal();};
window.openAddEvent=function(){const today=new Date().toISOString().split('T')[0];openModal(`<h3>Add Church Event</h3>
  <div class="form-group" style="margin-bottom:9px"><label>Date</label><input type="date" id="m-edate" value="${today}"/></div>
  <div class="form-group" style="margin-bottom:9px"><label>Event Title</label><input id="m-etitle" placeholder="e.g. RE Camp"/></div>
  <div class="form-group"><label>Notes (optional)</label><input id="m-enote" placeholder="Additional info"/></div>
  <div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  <button class="btn btn-primary" onclick="saveEvent()">Add</button></div>`);};
window.saveEvent=async function(){const date=R('m-edate').value,title=R('m-etitle').value.trim();if(!date||!title)return;if(!S.events)S.events={};S.events[date]={title,note:R('m-enote').value.trim()};await saveEvents();closeModal();};
window.delEvent=async function(date){delete S.events[date];await saveEvents();};

function renderClassHub(cid){
  if(!R('main-content'))return;
  const cl=clById(cid);const tab=classTab[cid]||'attendance';
  R('main-content').innerHTML=`
  <div class="class-hero" style="background:linear-gradient(135deg,${cl.color},${cl.color}bb)">
    <div class="em">${cl.emoji}</div><div><h2>${cl.name}</h2><p>${studsIn(cid).length} students</p></div>
  </div>
  <div class="tab-row">
    <button class="tab ${tab==='attendance'?'active':''}" onclick="setClassTab('${cid}','attendance')">✅ Att.</button>
    <button class="tab ${tab==='behaviour'?'active':''}" onclick="setClassTab('${cid}','behaviour')">📝 Notes</button>
    <button class="tab ${tab==='tests'?'active':''}" onclick="setClassTab('${cid}','tests')">📊 Tests</button>
    <button class="tab ${tab==='uniform'?'active':''}" onclick="setClassTab('${cid}','uniform')">👕 Uniform</button>
  </div>
  <div id="tab-body"></div>`;
  if(R('topbar-actions'))R('topbar-actions').innerHTML='';
  if(tab==='attendance'){if(R('topbar-actions'))R('topbar-actions').innerHTML=`<button class="btn btn-secondary btn-sm" onclick="openAddSession()">+ Session</button><button class="btn btn-success btn-sm" onclick="dlAtt()">⬇ Excel</button>`;renderAttTab(cid);}
  else if(tab==='behaviour'){if(R('topbar-actions'))R('topbar-actions').innerHTML=`<button class="btn btn-primary btn-sm" onclick="openBehModal('${cid}')">+ Note</button>`;renderBehTab(cid);}
  else if(tab==='tests'){if(R('topbar-actions'))R('topbar-actions').innerHTML=`<button class="btn btn-primary btn-sm" onclick="openAddTest('${cid}')">+ Test</button>`;renderTestTab(cid);}
  else renderUniTab(cid);
}
window.setClassTab=function(cid,tab){classTab[cid]=tab;renderClassHub(cid);};

function renderAttTab(cid){
  if(!R('tab-body'))return;
  const studs=studsIn(cid),sessions=S.sessions||[],cpct=classPct(cid);
  R('tab-body').innerHTML=`
  ${!sessions.length?`<div class="panel"><div class="empty-state"><div class="bi">📅</div><p>No sessions yet. Click "+ Session".</p></div></div>`:`
  <div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:5px">
      <h3 style="margin:0">Attendance</h3>
      ${cpct!==null?`<span style="font-size:14px;font-weight:800;color:${pctColor(cpct)}">${cpct}% avg</span>`:''}
    </div>
    <div class="scroll-x"><table style="min-width:360px">
      <thead><tr><th>Student</th>${sessions.map(s=>`<th style="text-align:center;font-size:10px;white-space:nowrap">${s}</th>`).join('')}<th style="text-align:center">%</th></tr></thead>
      <tbody>${studs.map(s=>{const pct=attPct(s.id);return`<tr>
        <td><div style="display:flex;align-items:center;gap:5px"><div class="avatar" style="background:${s.avatar}">${ini(s.name)}</div><span style="font-weight:600;white-space:nowrap;font-size:12px">${s.name}</span></div></td>
        ${sessions.map(sess=>{const k=sess+'_'+s.id,v=(S.attendance||{})[k]||'';return`<td style="text-align:center"><button class="att-btn ${v==='P'?'att-present':v==='A'?'att-absent':'att-none'}" onclick="toggleAtt('${k}','${cid}')">${v||'–'}</button></td>`}).join('')}
        <td style="text-align:center">${pct!==null?`<b style="color:${pctColor(pct)};font-size:12px">${pct}%</b>`:'–'}</td>
      </tr>`}).join('')}</tbody>
    </table></div>
  </div>`}
  <div class="panel"><h3>📊 All Classes</h3><div class="stats-row">
    ${CLS.map(cc=>{const p=classPct(cc.id);return`<div class="stat-card"><div>${cc.emoji}</div><div class="num" style="font-size:16px;color:${p!==null?pctColor(p):'#ccc'}">${p!==null?p+'%':'–'}</div><div class="lbl">${cc.name}</div></div>`}).join('')}
    <div class="stat-card" style="background:#f0f0ff"><div>🏫</div><div class="num" style="font-size:16px;color:#7c6ff7">${overallPct()!==null?overallPct()+'%':'–'}</div><div class="lbl">Overall</div></div>
  </div></div>`;}
window.toggleAtt=async function(key,cid){if(!S.attendance)S.attendance={};const c=S.attendance[key]||'';S.attendance[key]=c===''?'P':c==='P'?'A':'';await saveAttendance();};
window.openAddSession=function(){const today=new Date().toISOString().split('T')[0];openModal(`<h3>Add Session</h3><div class="form-group"><label>Date</label><input type="date" id="m-sd" value="${today}"/></div><div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addSession()">Add</button></div>`);};
window.addSession=async function(){const d=R('m-sd').value;if(!d)return;if(!(S.sessions||[]).includes(d)){S.sessions=[...(S.sessions||[]),d];S.sessions.sort();await saveSessions();}closeModal();};
window.dlAtt=function(){
  const wb=XLSX.utils.book_new();
  CLS.forEach(cl=>{const st=studsIn(cl.id),rows=[['Student',...(S.sessions||[]),'Attendance %']];
    st.forEach(s=>{const p=attPct(s.id);rows.push([s.name,...(S.sessions||[]).map(sess=>(S.attendance||{})[sess+'_'+s.id]||'–'),p!==null?p+'%':'–']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),cl.name);});
  const sum=[['Class','Students','Avg %']];
  CLS.forEach(cl=>sum.push([cl.name,studsIn(cl.id).length,classPct(cl.id)!==null?classPct(cl.id)+'%':'–']));
  sum.push(['OVERALL',(S.students||[]).length,overallPct()!==null?overallPct()+'%':'–']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'Summary');
  XLSX.writeFile(wb,'Church_Attendance.xlsx');
};

function renderBehTab(cid){
  if(!R('tab-body'))return;
  const studs=studsIn(cid),notes=(S.behaviour||[]).filter(b=>studs.find(s=>s.id===b.sid));
  R('tab-body').innerHTML=`<div class="panel"><h3>Behaviour & Notes</h3>
    ${notes.length?notes.slice().reverse().map(b=>{const s=(S.students||[]).find(x=>x.id===b.sid);if(!s)return'';return`
    <div class="srow"><div class="avatar" style="background:${s.avatar}">${ini(s.name)}</div>
    <div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:700">${s.name}</span>
      <span style="font-size:10px;font-weight:700;color:#7c6ff7">${b.date}</span>
      ${(b.chips||[]).map(ch=>`<span class="tag tag-blue">${ch}</span>`).join('')}
    </div>${b.note?`<div style="font-size:11px;color:#555;margin-top:2px">${b.note}</div>`:''}</div>
    <button class="btn btn-danger btn-sm" onclick="delNote('${b.id}')">✕</button></div>`}).join(''):
    '<div class="empty-state"><div class="bi">📝</div><p>No notes yet</p></div>'}
  </div>`;}
window.openBehModal=function(cid){
  const studs=studsIn(cid),today=new Date().toISOString().split('T')[0];
  openModal(`<h3>Add Behaviour Note</h3>
    <div class="form-row">
      <div class="form-group"><label>Student</label><select id="m-bs">${studs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Date</label><input type="date" id="m-bd" value="${today}"/></div>
    </div>
    <div class="form-group" style="margin-bottom:8px"><label>Tags</label>
      <div class="chip-row">${BEHAVIOURS.map(b=>`<button class="chip" onclick="this.classList.toggle('sel')">${b}</button>`).join('')}</div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="m-bn" placeholder="Observations..."></textarea></div>
    <div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBeh('${cid}')">Save</button></div>`);

window.saveBeh=async function(cid){S.behaviour=[...(S.behaviour||[]),{id:'b'+Date.now(),sid:R('m-bs').value,date:R('m-bd').value,chips:[...document.querySelectorAll('.chip.sel')].map(c=>c.textContent),note:R('m-bn').value.trim()}];await saveBehaviour();closeModal();classTab[cid]='behaviour';};
window.delNote=async function(id){S.behaviour=(S.behaviour||[]).filter(b=>b.id!==id);await saveBehaviour();};

function renderTestTab(cid){
  if(!R('tab-body'))return;
  const studs=studsIn(cid),tests=(S.tests||[]).filter(t=>t.classId===cid);
  R('tab-body').innerHTML=`<div class="panel"><h3>Test Results</h3>
  ${!tests.length?'<div class="empty-state"><div class="bi">📊</div><p>No tests yet</p></div>':`
  <div class="scroll-x"><table style="min-width:380px">
    <thead><tr><th>Student</th>${tests.map(t=>`<th style="text-align:center;white-space:nowrap">${t.name}<br><span style="font-size:9px;color:#aaa">/${t.total}pts</span></th>`).join('')}<th style="text-align:center">Avg</th></tr></thead>
    <tbody>${studs.map(s=>{const scores=tests.map(t=>(t.scores||{})[s.id]!==undefined?(t.scores||{})[s.id]:null);const valid=scores.filter(x=>x!==null);const avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):null;return`<tr>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="avatar" style="background:${s.avatar}">${ini(s.name)}</div><span style="font-weight:600;white-space:nowrap">${s.name}</span></div></td>
      ${tests.map((t,i)=>`<td style="text-align:center"><input class="score-input" type="number" min="0" max="${t.total}" value="${scores[i]!==null?scores[i]:''}" placeholder="–" onchange="saveScore('${t.id}','${s.id}',this.value,${t.total})"/></td>`).join('')}
      <td style="text-align:center;font-weight:700;color:${avg!==null?pctColor(Math.round(avg/(tests[0]?.total||100)*100)):'#ccc'}">${avg!==null?avg:'–'}</td>
    </tr>`}).join('')}</tbody>
  </table></div>`}</div>`;}
window.openAddTest=function(cid){const today=new Date().toISOString().split('T')[0];openModal(`<h3>Add Test</h3>
  <div class="form-row"><div class="form-group"><label>Test Name</label><input id="m-tn2" placeholder="e.g. Mid-Year Quiz"/></div><div class="form-group"><label>Date</label><input type="date" id="m-td" value="${today}"/></div></div>
  <div class="form-group"><label>Total Points</label><input type="number" id="m-tt" value="100" min="1"/></div>
  <div class="modal-btns"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addTest('${cid}')">Add</button></div>`);};
window.addTest=async function(cid){const name=R('m-tn2').value.trim();if(!name)return;S.tests=[...(S.tests||[]),{id:'t'+Date.now(),classId:cid,name,date:R('m-td').value,total:parseInt(R('m-tt').value)||100,scores:{}}];await saveTests();closeModal();};
window.saveScore=async function(tid,sid,val,total){const t=(S.tests||[]).find(x=>x.id===tid);if(!t)return;if(!t.scores)t.scores={};const v=parseFloat(val);if(!isNaN(v)&&v>=0&&v<=total)t.scores[sid]=v;else delete t.scores[sid];await saveTests();};

function renderUniTab(cid){
  if(!R('tab-body'))return;
  const cl=clById(cid),studs=studsIn(cid);
  const taken={};SIZES.forEach(sz=>{taken[sz]=(S.students||[]).filter(s=>(S.uniform||{})[s.id]?.size===sz).length;});
  R('tab-body').innerHTML=`
  <div class="panel"><h3>Choir Uniform Records</h3>
  <div class="scroll-x"><table style="min-width:420px">
    <thead><tr><th>Student</th><th>Size</th><th>Date Issued</th><th>Status</th></tr></thead>
    <tbody>${studs.map(s=>{const u=(S.uniform||{})[s.id]||{};return`<tr>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="avatar" style="background:${s.avatar}">${ini(s.name)}</div><span style="font-weight:600;white-space:nowrap">${s.name}</span></div></td>
      <td><select onchange="saveUni('${s.id}','size',this.value)" style="border-radius:8px;padding:5px 8px;border:1.5px solid #e0e0f0;font-size:13px;-webkit-appearance:none">
        <option value="">–</option>${SIZES.map(sz=>`<option value="${sz}" ${u.size===sz?'selected':''}>${sz}</option>`).join('')}
      </select></td>
      <td><input type="date" value="${u.date||''}" onchange="saveUni('${s.id}','date',this.value)" style="border-radius:8px;padding:5px 7px;border:1.5px solid #e0e0f0;font-size:12px;-webkit-appearance:none"/></td>
      <td><button class="uni-badge ${u.returned==='yes'?'uni-ret':u.returned==='no'?'uni-kept':'uni-none'}" onclick="toggleRet('${s.id}','${cid}')">
        ${u.returned==='yes'?'✓ Returned':u.returned==='no'?'✗ Kept':'– Set'}
      </button></td>
    </tr>`}).join('')}</tbody>
  </table></div></div>
  <div class="panel"><h3>📦 Stock Overview</h3>
  <div class="scroll-x"><table style="min-width:320px">
    <thead><tr><th>Size</th><th>Stock</th><th>Taken</th><th>Left</th></tr></thead>
    <tbody>${SIZES.map(sz=>{const tot=STOCK[sz],tk=taken[sz],rem=tot-tk;return`<tr>
      <td style="font-weight:700">${sz}</td><td>${tot}</td>
      <td style="font-weight:600;color:#7c6ff7">${tk}</td>
      <td style="font-weight:700;color:${rem<=0?'#ff6b9d':rem<=1?'#ff9f43':'#1dd1a1'}">${rem<=0?'None':rem}</td>
    </tr>`}).join('')}
    <tr style="background:#f8f8ff;font-weight:700"><td>Total</td><td>${SIZES.reduce((a,sz)=>a+STOCK[sz],0)}</td>
      <td style="color:#7c6ff7">${SIZES.reduce((a,sz)=>a+taken[sz],0)}</td>
      <td style="color:#1dd1a1">${SIZES.reduce((a,sz)=>a+Math.max(0,STOCK[sz]-taken[sz]),0)}</td></tr>
  </table></div></div>
  <div class="panel"><h3>Summary — ${cl.name}</h3><div class="stats-row">
    ${SIZES.map(sz=>{const n=studs.filter(s=>(S.uniform||{})[s.id]?.size===sz).length;return n?`<div class="stat-card"><div class="num">${n}</div><div class="lbl">Size ${sz}</div></div>`:''}).join('')}
    <div class="stat-card"><div class="num" style="color:#1dd1a1">${studs.filter(s=>(S.uniform||{})[s.id]?.returned==='yes').length}</div><div class="lbl">Returned</div></div>
    <div class="stat-card"><div class="num" style="color:#ff6b9d">${studs.filter(s=>(S.uniform||{})[s.id]?.returned==='no').length}</div><div class="lbl">Not Returned</div></div>
  </div></div>`;}
window.saveUni=async function(sid,field,val){if(!S.uniform)S.uniform={};if(!S.uniform[sid])S.uniform[sid]={};S.uniform[sid][field]=val;await saveUniform();};
window.toggleRet=async function(sid,cid){if(!S.uniform)S.uniform={};if(!S.uniform[sid])S.uniform[sid]={};const c=S.uniform[sid].returned||'';S.uniform[sid].returned=c===''?'no':c==='no'?'yes':'';await saveUniform();};

window.openModal=function(html){R('modal-box').innerHTML='<div class="modal-handle"></div>'+html;R('modal-overlay').classList.add('open');};
window.closeModal=function(){R('modal-overlay').classList.remove('open');};
R('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

startSync();
setTimeout(()=>{if(screen==='loading'){screen='landing';renderRoot();}},2500);
</script>
</body>
</html>
